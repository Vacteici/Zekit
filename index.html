<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEKIT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07070f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 50%, #1a0050 0%, transparent 70%),
        #07070f;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 56px 48px;
      text-align: center;
      width: 420px;
      max-width: 94vw;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .lock-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 28px;
      background: rgba(130,80,255,0.15);
      border: 1px solid rgba(130,80,255,0.35);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-icon svg { width: 26px; height: 26px; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
    }

    p {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.5px;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      min-height: 20px;
    }

    .status.error { color: #f87171; }
    .status.ok { color: #4ade80; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card">
    <div class="logo">ZEKIT</div>

    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h1>Zone sécurisée</h1>
    <p>Clique sur Continuer pour générer ta clé d'accès et entrer dans la zone secrète.</p>

    <button class="btn" id="btn" onclick="continuer()">Continuer</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const BOT_API = "zekit-bot-production.up.railway.app"; // ← remplace par ton URL

    async function continuer() {
      const btn = document.getElementById("btn");
      const status = document.getElementById("status");

      btn.disabled = true;
      status.className = "status";
      status.innerHTML = '<span class="spinner"></span> Génération de ta clé…';

      try {
        const res = await fetch(BOT_API + "/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ source: "checkpoint" })
        });

        if (!res.ok) throw new Error("Erreur serveur");
        const data = await res.json();

        // Stocke la clé localement et redirige
        sessionStorage.setItem("zekit_key", data.key);
        status.className = "status ok";
        status.textContent = "✓ Clé générée ! Redirection…";

        setTimeout(() => {
          window.location.href = "secret.html?key=" + encodeURIComponent(data.key);
        }, 800);

      } catch (e) {
        status.className = "status error";
        status.textContent = "Erreur de connexion. Réessaie.";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
