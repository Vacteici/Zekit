<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — ZEKIT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#06060a;--s:#0d0d14;--b:#161622;--acc:#d6f500;--t:#eeeef5;--t2:#8888a8;--t3:#3a3a50;--mono:'DM Mono',monospace;--disp:'Syne',sans-serif;--sans:'DM Sans',sans-serif;}
body{background:var(--bg);color:var(--t);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 5vw;}
.m{width:48px;height:48px;background:var(--acc);border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:22px;color:#000;margin:0 auto 28px;}
h1{font-family:var(--disp);font-size:clamp(80px,18vw,160px);font-weight:800;letter-spacing:-4px;color:var(--acc);line-height:1;margin-bottom:16px;}
h2{font-family:var(--disp);font-size:24px;font-weight:700;color:var(--t);margin-bottom:10px;}
p{font-size:14px;color:var(--t2);font-weight:300;max-width:400px;line-height:1.8;margin-bottom:32px;}
a{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--acc);color:#000;border-radius:50px;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s;}
a:hover{background:#c4df00;transform:translateY(-1px);}
</style>
</head>
<body>
<div class="m">Z.</div>
<h1>404</h1>
<h2>Page introuvable</h2>
<p>La page que tu cherches n'existe pas ou a été déplacée.</p>
<a href="/">← Retour à l'accueil</a>
</body>
</html>
